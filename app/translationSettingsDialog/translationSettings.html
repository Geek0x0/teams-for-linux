<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self';">
    <title>AI Assistant Settings</title>
    <link rel="stylesheet" href="translationSettings.css">
</head>
<body>
    <div class="container">
        <h2>AI Assistant Settings</h2>
        <p class="intro">Configure inline translation in the chat composer. Changes are saved automatically and applied to the main Teams window immediately.</p>
        <div class="grid">
            <label class="checkbox" for="enabled">
                <input id="enabled" type="checkbox">
                <span>Enable AI assistant in the chat input box</span>
            </label>
            <div class="field-row">
                <div class="field">
                    <label for="provider">AI Provider</label>
                    <select id="provider">
                        <option value="ai">AI (OpenAI-compatible)</option>
                    </select>
                </div>
                <div class="field">
                    <label for="target-language">Default Target Language</label>
                    <select id="target-language"></select>
                </div>
            </div>
            <div class="field">
                <label id="api-key-label" for="api-key">API Key</label>
                <input id="api-key" type="password" placeholder="Enter API key">
            </div>
            <div class="field">
                <label id="api-url-label" for="api-url">API URL</label>
                <input id="api-url" type="url" placeholder="https://api.example.com/...">
            </div>
            <div id="model-row" class="field">
                <label for="model">Model</label>
                <input id="model" type="text" placeholder="gpt-4.1-mini">
            </div>
            <div class="field">
                <label for="translation-prompt">Translation Prompt</label>
                <textarea id="translation-prompt" rows="5" placeholder="Prompt used when clicking Translate"></textarea>
            </div>
        </div>
        <div class="footer">
            <div id="save-status" class="status"></div>
            <div class="actions">
                <button id="show-key-button" type="button">Show Key</button>
                <button id="close-button" class="primary" type="button">Close</button>
            </div>
        </div>
    </div>
    <script src="translationSettings.js"></script>
</body>
</html>
